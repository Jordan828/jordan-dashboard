<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jordan — Command Center</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ──────────────────────────────────────────────────────────────── */
:root {
  --bg:      #090b10;
  --surface: #0f1117;
  --card:    #13161f;
  --card2:   #181c27;
  --border:  #1f2435;
  --border2: #252a3a;
  --tx:      #e8eaf0;
  --tx2:     #8b90a7;
  --tx3:     #4a5068;
  --green:   #00c98d;
  --red:     #ff4d6a;
  --amber:   #f5a623;
  --blue:    #4d9fff;
  --purple:  #a78bfa;
  --r:       12px;
  --r2:      8px;
  --gap:     16px;
}
*  { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--tx); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; font-size:14px; min-height:100vh; }
a  { color:var(--blue); text-decoration:none; }
button { cursor:pointer; border:none; outline:none; }
input,textarea,select { outline:none; font-family:inherit; font-size:14px; }

/* ── TOPBAR ──────────────────────────────────────────────────────────────── */
.topbar { background:var(--surface); border-bottom:1px solid var(--border); height:52px; padding:0 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.topbar-logo { font-size:15px; font-weight:700; display:flex; align-items:center; gap:8px; }
.topbar-logo span { color:var(--tx2); font-weight:400; font-size:13px; }
.topbar-right { display:flex; align-items:center; gap:12px; }
.clock-myt { font-size:12px; color:var(--tx2); }
.clock-myt b { color:var(--tx); }
.market-pill { display:flex; align-items:center; gap:5px; border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; border:1px solid; }
.market-open   { background:rgba(0,201,141,.1); border-color:rgba(0,201,141,.25); color:var(--green); }
.market-closed { background:rgba(245,166,35,.1); border-color:rgba(245,166,35,.25); color:var(--amber); }
.dot { width:6px; height:6px; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.dash-link { background:var(--green); color:#000; border-radius:20px; padding:5px 12px; font-size:11px; font-weight:700; transition:all .2s; display:flex; align-items:center; gap:5px; }
.dash-link:hover { background:#00b07a; transform:scale(1.03); }

/* ── LAYOUT ──────────────────────────────────────────────────────────────── */
.layout { display:grid; grid-template-columns:260px 1fr 300px; gap:var(--gap); padding:20px; max-width:1600px; margin:0 auto; }

/* ── CARDS ───────────────────────────────────────────────────────────────── */
.card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; margin-bottom:var(--gap); }
.card-title { font-size:11px; font-weight:600; color:var(--tx2); text-transform:uppercase; letter-spacing:.07em; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
.card-title-icon { font-size:13px; }

/* ── FOCUS BOX ───────────────────────────────────────────────────────────── */
.focus-card { background:linear-gradient(135deg,#0f1a2e,#111827); border:1px solid rgba(77,159,255,.2); border-radius:var(--r); padding:18px; margin-bottom:var(--gap); }
.focus-label { font-size:10px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.1em; margin-bottom:8px; }
.focus-input { background:transparent; border:none; color:var(--tx); font-size:17px; font-weight:600; width:100%; placeholder-color:var(--tx3); }
.focus-input::placeholder { color:var(--tx3); }
.focus-sub { font-size:11px; color:var(--tx3); margin-top:6px; }

/* ── TASKS ───────────────────────────────────────────────────────────────── */
.task-input-row { display:flex; gap:8px; margin-bottom:12px; }
.task-input { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:8px 12px; color:var(--tx); flex:1; }
.task-input::placeholder { color:var(--tx3); }
.btn-add { background:var(--blue); color:#fff; border-radius:var(--r2); padding:8px 14px; font-size:12px; font-weight:600; transition:all .15s; }
.btn-add:hover { background:#3a8de8; }
.task-priority { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:8px 10px; color:var(--tx2); font-size:12px; }
.task-list { display:flex; flex-direction:column; gap:6px; max-height:260px; overflow-y:auto; }
.task-item { display:flex; align-items:center; gap:10px; padding:9px 10px; background:var(--card2); border-radius:var(--r2); border:1px solid var(--border); transition:all .15s; }
.task-item.done { opacity:.45; }
.task-item.done .task-text { text-decoration:line-through; color:var(--tx3); }
.task-check { width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border2); background:transparent; appearance:none; cursor:pointer; flex-shrink:0; transition:all .15s; }
.task-check:checked { background:var(--green); border-color:var(--green); }
.task-text { flex:1; font-size:13px; }
.task-badge { font-size:10px; padding:1px 6px; border-radius:4px; font-weight:600; flex-shrink:0; }
.p-high   { background:rgba(255,77,106,.15);  color:var(--red);    }
.p-medium { background:rgba(245,166,35,.15);  color:var(--amber);  }
.p-low    { background:rgba(77,159,255,.15);  color:var(--blue);   }
.task-del { background:none; color:var(--tx3); font-size:14px; padding:0 4px; transition:color .15s; }
.task-del:hover { color:var(--red); }

/* ── REMINDERS ───────────────────────────────────────────────────────────── */
.reminder-input-row { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
.reminder-input { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:8px 12px; color:var(--tx); flex:1; min-width:120px; }
.reminder-input::placeholder { color:var(--tx3); }
.reminder-time { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:8px 10px; color:var(--tx2); font-size:12px; }
.reminder-list { display:flex; flex-direction:column; gap:6px; max-height:200px; overflow-y:auto; }
.reminder-item { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--card2); border-radius:var(--r2); border-left:3px solid var(--purple); }
.reminder-time-badge { font-size:11px; color:var(--purple); font-weight:600; flex-shrink:0; }
.reminder-text { flex:1; font-size:13px; }
.reminder-del { background:none; color:var(--tx3); font-size:14px; }
.reminder-del:hover { color:var(--red); }

/* ── NOTES ───────────────────────────────────────────────────────────────── */
.note-tabs { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.note-tab { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; border:1px solid var(--border2); background:transparent; color:var(--tx2); transition:all .15s; }
.note-tab.active { background:var(--blue); border-color:var(--blue); color:#fff; }
.note-textarea { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:10px 12px; color:var(--tx); width:100%; min-height:140px; resize:vertical; line-height:1.6; }
.note-textarea::placeholder { color:var(--tx3); }
.note-save-row { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
.note-saved { font-size:11px; color:var(--green); opacity:0; transition:opacity .3s; }
.note-saved.show { opacity:1; }
.btn-save { background:var(--card2); border:1px solid var(--border2); color:var(--tx2); border-radius:var(--r2); padding:6px 12px; font-size:11px; font-weight:600; transition:all .15s; }
.btn-save:hover { border-color:var(--blue); color:var(--blue); }

/* ── HABITS ──────────────────────────────────────────────────────────────── */
.habit-grid { display:flex; flex-direction:column; gap:8px; }
.habit-row { display:flex; align-items:center; gap:10px; }
.habit-name { font-size:12px; color:var(--tx2); width:100px; flex-shrink:0; }
.habit-dots { display:flex; gap:4px; flex:1; }
.habit-dot { width:20px; height:20px; border-radius:4px; border:1.5px solid var(--border2); background:transparent; cursor:pointer; transition:all .15s; flex-shrink:0; }
.habit-dot.done { border-color:transparent; }
.habit-streak { font-size:11px; color:var(--tx3); flex-shrink:0; width:40px; text-align:right; }
.habit-add-row { display:flex; gap:8px; margin-top:10px; }
.habit-add-input { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:7px 10px; color:var(--tx); flex:1; font-size:12px; }
.habit-add-input::placeholder { color:var(--tx3); }

/* ── GOALS ───────────────────────────────────────────────────────────────── */
.goal-list { display:flex; flex-direction:column; gap:8px; }
.goal-item { background:var(--card2); border-radius:var(--r2); padding:10px 12px; }
.goal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.goal-name { font-size:12px; font-weight:600; }
.goal-pct  { font-size:11px; color:var(--tx2); }
.goal-bar  { height:5px; background:var(--border); border-radius:3px; overflow:hidden; margin-bottom:4px; }
.goal-fill { height:100%; border-radius:3px; transition:width .4s; }
.goal-meta { font-size:10px; color:var(--tx3); display:flex; justify-content:space-between; }
.goal-add-row { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
.goal-add-input { background:var(--card2); border:1px solid var(--border2); border-radius:var(--r2); padding:7px 10px; color:var(--tx); flex:1; font-size:12px; min-width:100px; }
.goal-add-input::placeholder { color:var(--tx3); }

/* ── MARKET WIDGET ───────────────────────────────────────────────────────── */
.market-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:background .15s; border-radius:6px; padding:8px 6px; }
.market-row:last-child { border-bottom:none; }
.market-row:hover { background:var(--card2); }
.mkt-left { display:flex; flex-direction:column; gap:2px; }
.mkt-sym  { font-size:13px; font-weight:700; }
.mkt-name { font-size:10px; color:var(--tx3); }
.mkt-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.mkt-price { font-size:13px; font-weight:600; }
.mkt-chg   { font-size:11px; font-weight:600; padding:1px 6px; border-radius:6px; }
.mkt-up    { background:rgba(0,201,141,.12); color:var(--green); }
.mkt-dn    { background:rgba(255,77,106,.12); color:var(--red);   }
.view-all  { display:block; text-align:center; margin-top:10px; font-size:12px; color:var(--blue); padding:8px; border-radius:var(--r2); border:1px solid rgba(77,159,255,.2); background:rgba(77,159,255,.05); transition:all .15s; }
.view-all:hover { background:rgba(77,159,255,.1); }

/* ── STATS ROW ───────────────────────────────────────────────────────────── */
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:var(--gap); }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; text-align:center; }
.stat-val  { font-size:22px; font-weight:700; letter-spacing:-.5px; }
.stat-lbl  { font-size:10px; color:var(--tx3); text-transform:uppercase; letter-spacing:.05em; margin-top:3px; }

/* ── SCROLLBARS ──────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width:4px; height:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

/* ── RESPONSIVE ──────────────────────────────────────────────────────────── */
@media(max-width:1100px){ .layout{ grid-template-columns:1fr 1fr; } }
@media(max-width:720px){  .layout{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">⚡ Jordan <span>/ Command Center</span></div>
  <div class="topbar-right">
    <div class="clock-myt" id="clockDisplay"></div>
    <div class="market-pill" id="marketPill">
      <div class="dot" id="marketDot"></div>
      <span id="marketStatus">Checking...</span>
    </div>
    <a class="dash-link" href="https://jordan828.github.io/jordan-dashboard/" target="_blank">📊 Market Briefing ↗</a>
  </div>
</div>

<div class="layout">

<!-- ── LEFT COLUMN ─────────────────────────────────────────────────────── -->
<div class="left-col">

  <!-- DAILY FOCUS -->
  <div class="focus-card">
    <div class="focus-label">Today's Focus</div>
    <input class="focus-input" id="focusInput" placeholder="What's the one thing that matters today?" maxlength="120">
    <div class="focus-sub" id="focusSub">Press Enter to save</div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="statTasks" style="color:var(--blue)">0</div><div class="stat-lbl">Tasks Done</div></div>
    <div class="stat-card"><div class="stat-val" id="statHabits" style="color:var(--green)">0</div><div class="stat-lbl">Habits Today</div></div>
    <div class="stat-card"><div class="stat-val" id="statGoals" style="color:var(--purple)">0%</div><div class="stat-lbl">Goals Avg</div></div>
  </div>

  <!-- TASKS -->
  <div class="card">
    <div class="card-title"><span>✅ Tasks</span><span class="card-title-icon" id="taskCount" style="color:var(--tx3)">0 left</span></div>
    <div class="task-input-row">
      <input class="task-input" id="taskInput" placeholder="Add a task..." maxlength="100">
      <select class="task-priority" id="taskPriority">
        <option value="high">🔴 High</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="low">🔵 Low</option>
      </select>
      <button class="btn-add" onclick="addTask()">Add</button>
    </div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- REMINDERS -->
  <div class="card">
    <div class="card-title"><span>🔔 Reminders</span></div>
    <div class="reminder-input-row">
      <input class="reminder-input" id="reminderInput" placeholder="Add a reminder..." maxlength="100">
      <input class="reminder-time reminder-input" type="time" id="reminderTime" style="width:110px;flex:none">
      <button class="btn-add" onclick="addReminder()">Add</button>
    </div>
    <div class="reminder-list" id="reminderList"></div>
  </div>

</div>

<!-- ── MIDDLE COLUMN ────────────────────────────────────────────────────── -->
<div class="mid-col">

  <!-- NOTES -->
  <div class="card">
    <div class="card-title"><span>📝 Notes</span></div>
    <div class="note-tabs" id="noteTabs">
      <button class="note-tab active" onclick="switchNote(0,this)">General</button>
      <button class="note-tab" onclick="switchNote(1,this)">Trading Ideas</button>
      <button class="note-tab" onclick="switchNote(2,this)">Dev Log</button>
      <button class="note-tab" onclick="switchNote(3,this)">Goals</button>
    </div>
    <textarea class="note-textarea" id="noteArea" placeholder="Start writing..."></textarea>
    <div class="note-save-row">
      <span class="note-saved" id="noteSaved">✓ Saved</span>
      <button class="btn-save" onclick="saveNote()">Save note</button>
    </div>
  </div>

  <!-- HABIT TRACKER -->
  <div class="card">
    <div class="card-title"><span>🔁 Habit Tracker</span><span style="font-size:10px;color:var(--tx3)" id="habitDate"></span></div>
    <div class="habit-grid" id="habitGrid"></div>
    <div class="habit-add-row">
      <input class="habit-add-input" id="habitInput" placeholder="Add a habit (e.g. Read 30min)">
      <button class="btn-add" onclick="addHabit()" style="font-size:12px;padding:7px 12px">Add</button>
    </div>
  </div>

  <!-- GOALS -->
  <div class="card">
    <div class="card-title"><span>🎯 Goals</span></div>
    <div class="goal-list" id="goalList"></div>
    <div class="goal-add-row">
      <input class="goal-add-input" id="goalName" placeholder="Goal name">
      <input class="goal-add-input" type="number" id="goalTarget" placeholder="Target" style="width:80px;flex:none" min="1">
      <input class="goal-add-input" type="number" id="goalCurrent" placeholder="Current" style="width:80px;flex:none" min="0">
      <button class="btn-add" onclick="addGoal()" style="font-size:12px;padding:7px 12px">Add</button>
    </div>
  </div>

</div>

<!-- ── RIGHT COLUMN ─────────────────────────────────────────────────────── -->
<div class="right-col">

  <!-- MARKET WIDGET -->
  <div class="card">
    <div class="card-title"><span>📊 Market Snapshot</span><span style="font-size:10px;color:var(--tx3)">Last close</span></div>
    <div id="marketWidget"></div>
    <a class="view-all" href="https://jordan828.github.io/jordan-dashboard/" target="_blank">View full dashboard ↗</a>
  </div>

  <!-- QUICK LINKS -->
  <div class="card">
    <div class="card-title"><span>🔗 Quick Links</span></div>
    <div id="quickLinks" style="display:flex;flex-direction:column;gap:6px"></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <input class="task-input" id="linkLabel" placeholder="Label" style="width:90px;flex:none">
      <input class="task-input" id="linkUrl" placeholder="https://">
      <button class="btn-add" onclick="addLink()">Add</button>
    </div>
  </div>

  <!-- WEEKLY SUMMARY CHART -->
  <div class="card">
    <div class="card-title"><span>📈 Weekly Productivity</span></div>
    <div style="height:160px;position:relative"><canvas id="prodChart"></canvas></div>
  </div>

</div>
</div>

<script>
// ── STORAGE HELPERS ──────────────────────────────────────────────────────────
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem('jcc_'+k)); } catch{ return null; } },
  set: (k,v) => localStorage.setItem('jcc_'+k, JSON.stringify(v)),
};
const today = new Date().toISOString().slice(0,10);

// ── CLOCK & MARKET STATUS ────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const myt = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Kuala_Lumpur'}));
  const est = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  document.getElementById('clockDisplay').innerHTML =
    '<b>' + myt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true}) + '</b> MYT';

  const day = est.getDay(), h = est.getHours(), m = est.getMinutes();
  const mins = h*60+m;
  const isOpen = day>=1 && day<=5 && mins>=570 && mins<960; // 9:30AM-4PM EST
  const pill = document.getElementById('marketPill');
  const dot  = document.getElementById('marketDot');
  const stat = document.getElementById('marketStatus');
  if (isOpen) {
    pill.className = 'market-pill market-open';
    dot.style.background = 'var(--green)';
    stat.textContent = 'Market Open';
  } else {
    pill.className = 'market-pill market-closed';
    dot.style.background = 'var(--amber)';
    stat.textContent = 'Market Closed';
  }
}
setInterval(updateClock, 1000); updateClock();

// ── FOCUS ────────────────────────────────────────────────────────────────────
const focusInput = document.getElementById('focusInput');
focusInput.value = S.get('focus_'+today) || '';
focusInput.addEventListener('input', () => {
  S.set('focus_'+today, focusInput.value);
  document.getElementById('focusSub').textContent = focusInput.value ? '✓ Saved for today' : 'Press Enter to save';
});

// ── TASKS ────────────────────────────────────────────────────────────────────
let tasks = S.get('tasks') || [];
function saveTasks() { S.set('tasks', tasks); renderTasks(); updateStats(); }
function addTask() {
  const txt = document.getElementById('taskInput').value.trim();
  const pri = document.getElementById('taskPriority').value;
  if (!txt) return;
  tasks.unshift({id:Date.now(), text:txt, priority:pri, done:false, date:today});
  document.getElementById('taskInput').value = '';
  saveTasks();
}
function toggleTask(id) {
  const t = tasks.find(t=>t.id===id); if(t) t.done = !t.done; saveTasks();
}
function deleteTask(id) { tasks = tasks.filter(t=>t.id!==id); saveTasks(); }
function renderTasks() {
  const el = document.getElementById('taskList');
  const priColor = {high:'p-high',medium:'p-medium',low:'p-low'};
  const priLabel = {high:'High',medium:'Med',low:'Low'};
  const sorted = [...tasks].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    const order={high:0,medium:1,low:2};
    return order[a.priority]-order[b.priority];
  });
  el.innerHTML = sorted.map(t => `
    <div class="task-item ${t.done?'done':''}">
      <input type="checkbox" class="task-check" ${t.done?'checked':''} onchange="toggleTask(${t.id})">
      <span class="task-text">${t.text}</span>
      <span class="task-badge ${priColor[t.priority]}">${priLabel[t.priority]}</span>
      <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
    </div>`).join('');
  const left = tasks.filter(t=>!t.done).length;
  document.getElementById('taskCount').textContent = left + ' left';
}
document.getElementById('taskInput').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
renderTasks();

// ── REMINDERS ────────────────────────────────────────────────────────────────
let reminders = S.get('reminders') || [];
function saveReminders() { S.set('reminders', reminders); renderReminders(); }
function addReminder() {
  const txt  = document.getElementById('reminderInput').value.trim();
  const time = document.getElementById('reminderTime').value;
  if (!txt) return;
  reminders.push({id:Date.now(), text:txt, time:time||'—'});
  reminders.sort((a,b)=>a.time.localeCompare(b.time));
  document.getElementById('reminderInput').value = '';
  document.getElementById('reminderTime').value = '';
  saveReminders();
}
function deleteReminder(id) { reminders = reminders.filter(r=>r.id!==id); saveReminders(); }
function renderReminders() {
  document.getElementById('reminderList').innerHTML = reminders.length
    ? reminders.map(r=>`
        <div class="reminder-item">
          <span class="reminder-time-badge">${r.time}</span>
          <span class="reminder-text">${r.text}</span>
          <button class="reminder-del" onclick="deleteReminder(${r.id})">✕</button>
        </div>`).join('')
    : '<div style="color:var(--tx3);font-size:12px;padding:8px 0">No reminders yet</div>';
}
document.getElementById('reminderInput').addEventListener('keydown', e => { if(e.key==='Enter') addReminder(); });
renderReminders();

// Check reminders every minute
function checkReminders() {
  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  reminders.forEach(r => {
    if(r.time===hhmm && !r.notified) {
      r.notified = true;
      if(Notification.permission==='granted') new Notification('⏰ Reminder', {body:r.text});
      else alert('⏰ Reminder: ' + r.text);
      saveReminders();
    }
  });
}
if(Notification.permission==='default') Notification.requestPermission();
setInterval(checkReminders, 30000);

// ── NOTES ────────────────────────────────────────────────────────────────────
let currentNote = 0;
const noteArea = document.getElementById('noteArea');
noteArea.value = S.get('note_'+currentNote) || '';
function switchNote(idx, btn) {
  saveNote(true);
  currentNote = idx;
  noteArea.value = S.get('note_'+idx) || '';
  document.querySelectorAll('.note-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function saveNote(silent=false) {
  S.set('note_'+currentNote, noteArea.value);
  if (!silent) {
    const el = document.getElementById('noteSaved');
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2000);
  }
}
noteArea.addEventListener('keydown', e => { if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveNote();} });
setInterval(()=>saveNote(true), 10000); // auto-save every 10s

// ── HABITS ───────────────────────────────────────────────────────────────────
let habits = S.get('habits') || [
  {id:1, name:'Exercise',    color:'#00c98d'},
  {id:2, name:'Read 30min',  color:'#4d9fff'},
  {id:3, name:'No junk food',color:'#a78bfa'},
];
let habitLogs = S.get('habitLogs') || {};

function saveHabits() { S.set('habits', habits); S.set('habitLogs', habitLogs); renderHabits(); updateStats(); }
function toggleHabit(hid, dayOffset) {
  const key = hid+'_'+dayOffset;
  habitLogs[key] = !habitLogs[key];
  saveHabits();
}
function deleteHabit(hid) { habits = habits.filter(h=>h.id!==hid); saveHabits(); }
function addHabit() {
  const name = document.getElementById('habitInput').value.trim();
  if (!name) return;
  const colors = ['#00c98d','#4d9fff','#a78bfa','#f5a623','#ff4d6a'];
  habits.push({id:Date.now(), name, color:colors[habits.length%colors.length]});
  document.getElementById('habitInput').value = '';
  saveHabits();
}
function renderHabits() {
  const days = 7;
  const todayDate = new Date();
  document.getElementById('habitDate').textContent = 'Last 7 days';
  document.getElementById('habitGrid').innerHTML = habits.map(h => {
    const dots = Array.from({length:days},(_,i)=>{
      const offset = i-days+1;
      const done = habitLogs[h.id+'_'+offset];
      return `<div class="habit-dot${done?' done':''}" style="${done?'background:'+h.color+';border-color:'+h.color:''}" onclick="toggleHabit(${h.id},${offset})" title="${offset===0?'Today':offset===-1?'Yesterday':Math.abs(offset)+'d ago'}"></div>`;
    }).join('');
    const streak = (() => {
      let s=0; for(let i=0;i>=-(days-1);i--){ if(habitLogs[h.id+'_'+i]) s++; else break; } return s;
    })();
    return `<div class="habit-row">
      <span class="habit-name" style="color:${h.color}">${h.name.slice(0,14)}</span>
      <div class="habit-dots">${dots}</div>
      <span class="habit-streak">🔥${streak}</span>
      <button onclick="deleteHabit(${h.id})" style="background:none;color:var(--tx3);font-size:12px;margin-left:4px">✕</button>
    </div>`;
  }).join('');
}
document.getElementById('habitInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addHabit(); });
renderHabits();

// ── GOALS ────────────────────────────────────────────────────────────────────
let goals = S.get('goals') || [
  {id:1, name:'Save $10,000', current:3200,  target:10000, color:'#00c98d'},
  {id:2, name:'Read 24 books', current:7,    target:24,    color:'#4d9fff'},
  {id:3, name:'Ship 5 projects',current:2,   target:5,     color:'#a78bfa'},
];
function saveGoals() { S.set('goals', goals); renderGoals(); updateStats(); }
function addGoal() {
  const name = document.getElementById('goalName').value.trim();
  const target = parseInt(document.getElementById('goalTarget').value);
  const current = parseInt(document.getElementById('goalCurrent').value) || 0;
  if(!name || !target) return;
  const colors = ['#00c98d','#4d9fff','#a78bfa','#f5a623','#ff4d6a'];
  goals.push({id:Date.now(), name, current, target, color:colors[goals.length%colors.length]});
  document.getElementById('goalName').value='';
  document.getElementById('goalTarget').value='';
  document.getElementById('goalCurrent').value='';
  saveGoals();
}
function deleteGoal(id) { goals=goals.filter(g=>g.id!==id); saveGoals(); }
function updateGoalProgress(id, val) {
  const g = goals.find(g=>g.id===id);
  if(g) { g.current = Math.min(g.target, Math.max(0, parseInt(val)||0)); saveGoals(); }
}
function renderGoals() {
  document.getElementById('goalList').innerHTML = goals.map(g => {
    const pct = Math.min(100, Math.round(g.current/g.target*100));
    return `<div class="goal-item">
      <div class="goal-header">
        <span class="goal-name">${g.name}</span>
        <span class="goal-pct" style="color:${g.color}">${pct}%</span>
      </div>
      <div class="goal-bar"><div class="goal-fill" style="width:${pct}%;background:${g.color}"></div></div>
      <div class="goal-meta">
        <span><input type="number" value="${g.current}" onchange="updateGoalProgress(${g.id},this.value)" style="background:transparent;border:none;color:var(--tx2);width:60px;font-size:10px"> / ${g.target}</span>
        <button onclick="deleteGoal(${g.id})" style="background:none;color:var(--tx3);font-size:11px">✕</button>
      </div>
    </div>`;
  }).join('');
}
renderGoals();

// ── QUICK LINKS ───────────────────────────────────────────────────────────────
let links = S.get('links') || [
  {id:1, label:'Market Briefing', url:'https://jordan828.github.io/jordan-dashboard/'},
  {id:2, label:'GitHub',          url:'https://github.com/jordan828'},
  {id:3, label:'FMP Dashboard',   url:'https://financialmodelingprep.com/financial-summary/NVDA'},
];
function saveLinks() { S.set('links', links); renderLinks(); }
function addLink() {
  const label = document.getElementById('linkLabel').value.trim();
  let url = document.getElementById('linkUrl').value.trim();
  if(!label||!url) return;
  if(!url.startsWith('http')) url='https://'+url;
  links.push({id:Date.now(),label,url});
  document.getElementById('linkLabel').value='';
  document.getElementById('linkUrl').value='';
  saveLinks();
}
function deleteLink(id) { links=links.filter(l=>l.id!==id); saveLinks(); }
function renderLinks() {
  document.getElementById('quickLinks').innerHTML = links.map(l=>
    `<div style="display:flex;align-items:center;gap:8px">
      <a href="${l.url}" target="_blank" style="flex:1;padding:8px 10px;background:var(--card2);border-radius:var(--r2);border:1px solid var(--border2);color:var(--tx);font-size:12px;transition:border-color .15s" onmouseover="this.style.borderColor='var(--blue)'" onmouseout="this.style.borderColor='var(--border2)'">
        🔗 ${l.label}
      </a>
      <button onclick="deleteLink(${l.id})" style="background:none;color:var(--tx3);font-size:13px">✕</button>
    </div>`
  ).join('');
}
renderLinks();

// ── WEEKLY PRODUCTIVITY CHART ─────────────────────────────────────────────────
const days7 = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const taskData   = days7.map(()=>Math.floor(Math.random()*6+1));
const habitData  = days7.map(()=>Math.floor(Math.random()*3+1));
new Chart(document.getElementById('prodChart'),{
  type:'bar',
  data:{labels:days7,datasets:[
    {label:'Tasks',data:taskData,backgroundColor:'rgba(77,159,255,.7)',borderRadius:4},
    {label:'Habits',data:habitData,backgroundColor:'rgba(0,201,141,.7)',borderRadius:4},
  ]},

    plugins:{legend:{labels:{color:'#8b90a7',font:{size:10},boxWidth:10}}},

      x:{grid:{display:false},ticks:{color:'#8b90a7',font:{size:10}}},

    }
  }
});

// ── STATS UPDATE ──────────────────────────────────────────────────────────────
function updateStats() {
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('statTasks').textContent = done;
  const habitsToday = habits.filter(h=>habitLogs[h.id+'_0']).length;
  document.getElementById('statHabits').textContent = habitsToday+'/'+habits.length;
  const avg = goals.length ? Math.round(goals.reduce((a,g)=>a+Math.min(100,g.current/g.target*100),0)/goals.length) : 0;
  document.getElementById('statGoals').textContent = avg+'%';
}
updateStats();
</script>
